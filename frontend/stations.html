<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stations — EVCharge</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">EV<span>Charge</span></span>
    </a>
    <nav>
      <a href="stations.html" class="active">Stations</a>
      <a href="myBookings.html">My Bookings</a>
      <button class="nav-btn nav-btn-outline" onclick="logout()">Log Out</button>
    </nav>
  </div>

  <div class="page-wrapper">
    <div class="page-header fade-in">
      <h1>⚡ Charging Stations</h1>
      <p>Browse available stations and book a slot to charge your EV</p>
      <div class="search-container" style="margin-top: 1.5rem; display: flex; gap: 10px; max-width: 500px;">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by location or name..."
          style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); flex-grow: 1; background: var(--card-bg); color: var(--text);">
        <button class="btn btn-primary" onclick="handleSearch()">Search</button>
      </div>
    </div>

    <div id="stations" class="stations-grid"></div>
  </div>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    let userLat = null;
    let userLng = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            fetchStations(userLat, userLng);
          },
          (error) => {
            console.warn("Geolocation error:", error);
            fetchStations();
          },
          { timeout: 5000 }
        );
      } else {
        fetchStations();
      }

      document.getElementById("searchInput").addEventListener("keypress", (e) => {
        if (e.key === 'Enter') handleSearch();
      });
    });

    function handleSearch() {
      const query = document.getElementById("searchInput").value;
      fetchStations(userLat, userLng, query);
    }

    function fetchStations(lat = null, lng = null, searchQuery = '') {
      let url = 'http://localhost:5000/api/stations?';
      const params = new URLSearchParams();
      if (lat && lng) {
        params.append('lat', lat);
        params.append('lng', lng);
      }
      if (searchQuery) {
        params.append('search', searchQuery);
      }
      url += params.toString();

      fetch(url)
        .then(res => res.json())
        .then(data => {
          let output = "";

          if (data.length === 0) {
            output = `
          <div class="empty-state">
            <div class="empty-icon">🔌</div>
            <h3>No stations available</h3>
            <p>We couldn't find any stations matching your search.</p>
          </div>
        `;
          } else {
            data.forEach((station, index) => {
              const availPercent = Math.round((station.available_slots / station.total_slots) * 100);
              const statusColor = availPercent > 50 ? 'var(--accent)' : availPercent > 20 ? 'var(--warning)' : 'var(--danger)';

              let distanceHtml = '';
              if (station.distance !== undefined) {
                distanceHtml = `<div class="station-distance" style="font-size: 0.85rem; color: var(--accent); margin-top: 5px;">📍 ${parseFloat(station.distance).toFixed(1)} km away</div>`;
              }

              output += `
            <div class="station-card fade-in" style="animation-delay: ${index * 0.08}s; opacity: 0;">
              <div class="station-icon">🏢</div>
              <h3>${station.name}</h3>
              <div class="station-location">
                📍 ${station.location}
              </div>
              ${distanceHtml}
              <div class="station-meta">
                <div class="meta-item">
                  <span>🔋</span>
                  <span>Total: <span class="meta-value">${station.total_slots}</span></span>
                </div>
                <div class="meta-item">
                  <span style="color: ${statusColor};">●</span>
                  <span>Available: <span class="meta-value" style="color: ${statusColor};">${station.available_slots}</span></span>
                </div>
              </div>
              <button class="btn btn-primary" onclick="viewSlots(${station.id})">
                View Available Slots →
              </button>
            </div>
          `;
            });
          }

          document.getElementById("stations").innerHTML = output;
        })
        .catch(err => console.error("Error fetching stations:", err));
    }

    function viewSlots(id) {
      window.location.href = "booking.html?stationId=" + id;
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("userId");
      window.location.href = "login.html";
    }
  </script>

</body>

</html>
