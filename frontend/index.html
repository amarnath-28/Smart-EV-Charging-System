<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart EV Charging System - Find, book, and manage electric vehicle charging slots with ease.">
  <title>Smart EV Charging</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">EV<span>Charge</span></span>
    </a>
    <nav>
      <a href="login.html" class="nav-btn nav-btn-outline">Log In</a>
      <a href="register.html" class="nav-btn nav-btn-primary">Sign Up</a>
    </nav>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge fade-in">
        <span class="badge-dot"></span>
        Live charging stations available
      </div>

      <h1 class="fade-in fade-in-delay-1">
        Smart <span class="highlight">EV Charging</span> Made Simple
      </h1>

      <p class="hero-desc fade-in fade-in-delay-2">
        Find nearby stations, book your slot in seconds, and get a QR code for seamless check-in. No more waiting — charge smarter.
      </p>

      <div class="hero-actions fade-in fade-in-delay-3">
        <a href="register.html" class="btn btn-primary">Get Started →</a>
        <a href="login.html" class="btn btn-outline">I have an account</a>
      </div>

      <div class="hero-stats fade-in fade-in-delay-3">
        <div class="hero-stat">
          <div class="stat-value">6+</div>
          <div class="stat-label">Stations</div>
        </div>
        <div class="hero-stat">
          <div class="stat-value">30+</div>
          <div class="stat-label">Slots</div>
        </div>
        <div class="hero-stat">
          <div class="stat-value">24/7</div>
          <div class="stat-label">Availability</div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
